<svg width="720" height="120" viewBox="0 0 720 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line {
      stroke: #9ca3af;
      stroke-width: 1;
      opacity: .28;
      stroke-linecap: round;
    }

    .node {
      fill: #6b7280;
      opacity: .72;
      transform-origin: center;
      transform-box: fill-box;
      animation: pulse 3s ease-in-out infinite;
    }

    .packet {
      fill: #4b5563;
      opacity: .9;
    }

    @keyframes pulse {
      0%,100% { opacity: .45; transform: scale(1); }
      50% { opacity: .95; transform: scale(1.28); }
    }
  </style>

  <line class="line" x1="70" y1="60" x2="180" y2="35"></line>
  <line class="line" x1="70" y1="60" x2="180" y2="85"></line>
  <line class="line" x1="180" y1="35" x2="320" y2="60"></line>
  <line class="line" x1="180" y1="85" x2="320" y2="60"></line>
  <line class="line" x1="320" y1="60" x2="470" y2="35"></line>
  <line class="line" x1="320" y1="60" x2="470" y2="85"></line>
  <line class="line" x1="470" y1="35" x2="620" y2="60"></line>
  <line class="line" x1="470" y1="85" x2="620" y2="60"></line>

  <circle class="node" cx="70" cy="60" r="3"></circle>
  <circle class="node" cx="180" cy="35" r="3" style="animation-delay:.3s"></circle>
  <circle class="node" cx="180" cy="85" r="3" style="animation-delay:.7s"></circle>
  <circle class="node" cx="320" cy="60" r="3" style="animation-delay:1.1s"></circle>
  <circle class="node" cx="470" cy="35" r="3" style="animation-delay:1.5s"></circle>
  <circle class="node" cx="470" cy="85" r="3" style="animation-delay:1.9s"></circle>
  <circle class="node" cx="620" cy="60" r="3" style="animation-delay:2.3s"></circle>

  <circle class="packet" r="2.2">
    <animateMotion dur="4.2s" repeatCount="indefinite" path="M70 60 L180 35 L320 60 L470 35 L620 60"></animateMotion>
  </circle>

  <circle class="packet" r="2" opacity=".55">
    <animateMotion dur="5.2s" begin="1.1s" repeatCount="indefinite" path="M70 60 L180 85 L320 60 L470 85 L620 60"></animateMotion>
  </circle>
</svg>